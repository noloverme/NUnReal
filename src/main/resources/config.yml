# ============================
# NUnReal Configuration
# ============================

# Настройки крафта
craft:
  enabled: true
  slots:
    A: NETHERITE_INGOT
    B: AMETHYST_SHARD
    C: BLAZE_ROD
    D: DIAMOND
  result-name: "§6Блок Способностей"
  result-lore:
    - "§7Поставьте и нажмите ПКМ"
    - "§7чтобы выбрать способность"

# Настройки блоков
blocks:
  one-per-chunk: true
  require-pickaxe: true
  break-time-ticks: 20
  insta-break: false
  drop-item: true
  messages:
    placed: "§aБлок способностей установлен! Нажмите ПКМ для настройки."
    already-exists: "§cВ этом чанке уже есть блок способностей!"
    broken: "§eБлок способностей разрушен."
    need-pickaxe: "§cИспользуйте кирку для разрушения!"

# Настройки экономики
economy:
  default-cost:
    material: DIAMOND
    amount: 1
  ability-costs:
    MINING:
      material: DIAMOND
      amount: 20
    LONG_ARM:
      material: DIAMOND
      amount: 20
    ANTI_KNOCKBACK:
      material: DIAMOND
      amount: 1
    LUCK:
      material: DIAMOND
      amount: 5
    DWARF:
      material: DIAMOND
      amount: 1
    FALL_RESIST:
      material: DIAMOND
      amount: 1
    GROWTH:
      material: DIAMOND
      amount: 5
    MAGNET:
      material: DIAMOND
      amount: 10
    FLIGHT:
      material: NETHERITE_INGOT
      amount: 10
    INFINITE_TRADES:
      material: NETHERITE_INGOT
      amount: 10
    KEEP_RESOURCES:
      material: DIAMOND
      amount: 32
    SATURATION:
      material: DIAMOND
      amount: 3
    AUTO_SMELT:
      material: DIAMOND
      amount: 15
    HOLY_GROUND:
      material: DIAMOND
      amount: 20
    THRIFTY_CRAFT:
      material: NETHERITE_INGOT
      amount: 2
