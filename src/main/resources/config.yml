# Настройки атрибутов
abilities:
  MINING:
    attribute: BLOCK_BREAK_SPEED
    value: 30.0
  LONG_ARM:
    attribute: ENTITY_INTERACTION_RANGE
    value: 15.0
  ANTI_KNOCKBACK:
    attribute: KNOCKBACK_RESISTANCE
    value: 30.0
  LUCK:
    attribute: LUCK
    value: 30.0
  DWARF:
    attribute: SCALE
    value: -0.75
  FALL_RESIST:
    attribute: SAFE_FALL_DISTANCE
    value: 10.0
  GROWTH:
    extra-growth-chance: 0.5
    ageable-only: true
  MAGNET:
    radius: 8.0
    speed: 0.30
    interval-ticks: 5
    max-items-per-tick: 100
  FLIGHT:
    fly-speed: 0.1
    exit-protection: SLOW_FALLING
    slow-falling-seconds: 5
  INFINITE_TRADES:
    villagers-only: true
    reopen-exhausted-trades: true
    close-open-trade-on-deactivate: true
  KEEP_RESOURCES:
    keep-inventory: true
    keep-exp: true
    clear-item-drops: true
    clear-exp-drops: true
  SATURATION:
    freeze-food-level: true
    freeze-saturation: true
  AUTO_SMELT:
    affected-blocks:
      IRON_ORE: IRON_INGOT
      DEEPSLATE_IRON_ORE: IRON_INGOT
      GOLD_ORE: GOLD_INGOT
      DEEPSLATE_GOLD_ORE: GOLD_INGOT
      COPPER_ORE: COPPER_INGOT
      DEEPSLATE_COPPER_ORE: COPPER_INGOT
    respect-silk-touch: true
    respect-fortune: true
  HOLY_GROUND:
    block-raids: false
    blocked-spawn-reasons:
      - NATURAL
      - JOCKEY
      - PATROL
      - REINFORCEMENTS
  THRIFTY_CRAFT:
    chance: 0.15
    affect-vanilla-recipes: true
    affect-custom-recipes: true
    workbench-only: true
    blacklisted-items: []

# Настройки периодической задачи
task:
