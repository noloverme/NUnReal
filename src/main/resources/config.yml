  flight-disabled: "§7Вы покинули зону полёта."
  ability-already-active: "§eЭта способность уже активна в чанке."
  resources-kept: "§6Ваши ресурсы сохранены благодаря способности чанка."
  no-permission: "§cНет прав!"
  thrifty-craft-triggered: "§aБережливый крафт! Вам вернулся 1x {item}."

